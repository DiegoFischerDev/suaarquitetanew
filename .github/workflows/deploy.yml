name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare release bundle
        run: |
          mkdir -p release
          cp -r .next/standalone/. release/
          mkdir -p release/.next
          cp -r .next/static release/.next/static
          cp -r public release/public
          cp deploy/ecosystem.config.cjs release/ecosystem.config.cjs
          tar -czf release.tar.gz -C release .

      - name: Upload release to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: release.tar.gz
          target: /tmp

      - name: Extract and restart app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            mkdir -p "${DEPLOY_PATH}"
            tar -xzf /tmp/release.tar.gz -C "${DEPLOY_PATH}"
            rm -f /tmp/release.tar.gz
            cd "${DEPLOY_PATH}"
            if pm2 describe suaarquiteta >/dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs --update-env
            else
              pm2 start ecosystem.config.cjs
            fi
            pm2 save
