# Virtual host ISOLADO — só responde por suaarquiteta.com / www.suaarquiteta.com
# Não interfere em outros server_name já configurados na VPS.
# Instalar com: bash deploy/install-nginx-site.sh

server {
    listen 80;
    listen [::]:80;
    server_name suaarquiteta.com www.suaarquiteta.com;

    access_log /var/log/nginx/suaarquiteta.access.log;
    error_log /var/log/nginx/suaarquiteta.error.log warn;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
